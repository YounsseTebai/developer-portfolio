<header appScroll toogleClass="sticky" [activateOn]="1">
    <nav class="navigation">
        <div class="container">
            <a>
                <img routerLink="/" fragment="landing" class="logo" [src]='"assets/img/"+logoName+".png"' alt="Logo" width="170" height="24">
            </a>

            <div class="nav">
                <div class="nav-body">
                    <ul class="nav-list">
                        @for (item of navItems; track item) {
                        <li class="nav-item">
                            <a routerLink="/" [fragment]="item.link" [routerLinkActive]="item.activeClassName" routerLinkActive="active" [routerLinkActiveOptions]="{ matrixParams: 'exact', queryParams: 'exact', paths: 'exact', fragment: 'exact'}" [href]="item.link" [className]="item.className">
                {{ item.title }}
              </a>
                        </li>
                        }
                    </ul>
                    <app-theme-switcher></app-theme-switcher>
                </div>
            </div>
            @if (sidenavState === 'in'){
            <div class="nav-backdrop" (click)="closeSidenav()"></div>
            }
        </div>
    </nav>
</header>
<app-sidenav [@slideInOut]="sidenavState" (onClose)="closeSidenav()"></app-sidenav>
